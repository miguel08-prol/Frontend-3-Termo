<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade • PixelGram</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" href="/Formativa/icon/favicon.svg">
    <link rel="stylesheet" href="/Formativa/assets/css/atividade.css">
    <link rel="stylesheet" href="/Formativa/assets/css/main.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
           <a href="index.html" class="logo">Pixel<span>Gram</span></a>
            <div class="nav-icons">
                <a href="index.html"><i data-lucide="home"></i></a>
                <a href="mensagens.html"><i data-lucide="message-circle"></i></a>
                <i data-lucide="plus-square"></i>
                <a href="explorar.html"><i data-lucide="compass"></i></a>
                <a href="atividade.html"><i data-lucide="heart" class="nav-active"></i></a>
                <a href="perfil.html"><img src="https://i.pravatar.cc/150?u=me" class="profile-pic-nav"></a>
            </div>
        </div>
    </nav>

    <main class="activity-container">
        <h2>Atividade</h2>

        <section class="activity-section">
            <h3>Hoje</h3>
            <div class="activity-item">
                <img src="https://i.pravatar.cc/150?u=9" class="user-avatar">
                <p class="activity-text"><strong>marcos_silva</strong> curtiu a sua foto. <span class="time">2h</span></p>
                <img src="https://picsum.photos/id/10/50/50" class="post-preview">
            </div>
            <div class="activity-item">
                <img src="https://i.pravatar.cc/150?u=12" class="user-avatar">
                <p class="activity-text"><strong>ana.clara</strong> começou a seguir você. <span class="time">5h</span></p>
                <button class="follow-btn">Seguir</button>
            </div>
        </section>

        <section class="activity-section">
            <h3>Esta semana</h3>
            <div class="activity-item">
                <img src="https://i.pravatar.cc/150?u=22" class="user-avatar">
                <p class="activity-text"><strong>chef_vini</strong> e <strong>outras pessoas</strong> curtiram a sua foto. <span class="time">2d</span></p>
                <img src="https://picsum.photos/id/20/50/50" class="post-preview">
            </div>
            <div class="activity-item">
                <img src="https://i.pravatar.cc/150?u=30" class="user-avatar">
                <p class="activity-text"><strong>tech_news</strong> mencionou você em um comentário: <em>"Olha isso!"</em> <span class="time">3d</span></p>
                <img src="https://picsum.photos/id/30/50/50" class="post-preview">
            </div>
        </section>
    </main>

<div id="createModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <button class="close-btn" onclick="closeCreateModal()">Cancelar</button>
            <h3>Criar nova publicação</h3>
            <button class="share-btn" id="shareBtn" style="display: none;">Compartilhar</button>
        </div>
        
        <div class="modal-body" id="dropZone">
            <div id="uploadPrompt">
                <i data-lucide="image"></i>
                <p>Arraste as fotos e os vídeos aqui</p>
                <button class="select-file-btn" onclick="document.getElementById('fileInput').click()">
                    Selecionar no computador
                </button>
                <input type="file" id="fileInput" hidden accept="image/*,video/*">
            </div>
            
            <div id="imagePreviewContainer" style="display: none;">
                <img id="imagePreview" src="" alt="Preview">
            </div>
        </div>
    </div>
</div>

    <script>lucide.createIcons();</script>
</body>
</html>
