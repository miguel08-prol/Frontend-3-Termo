<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorar • PixelGram</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" href="/Formativa/icon/favicon.svg">
    
    <link rel="stylesheet" href="/Formativa/assets/css/main.css">
    <link rel="stylesheet" href="/Formativa/assets/css/index.css">
    <link rel="stylesheet" href="/Formativa/assets/css/explorar.css">
</head>
<body>

    <header class="mobile-header">
        <a href="index.html" class="logo">Pixel<span>Gram</span></a>
        <div class="mobile-search-bar">
            <i data-lucide="search"></i>
            <input type="text" placeholder="Pesquisar">
        </div>
        <i data-lucide="menu" onclick="toggleSidebar()"></i>
    </header>

    <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div id="sidebar-placeholder"></div>

    <main class="main-content">
        <div class="explore-container">

                    </div>
                </div>
                <div class="explore-item">
